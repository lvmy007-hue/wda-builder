name: Build WebDriverAgent IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tail -5
          echo "xcodebuild exit: $?"

      - name: Inspect build products
        run: |
          echo "===== All .app directories ====="
          find ./build/Build/Products -name "*.app" -type d

          echo ""
          RUNNER=$(find ./build/Build/Products -maxdepth 2 -name "*Runner*.app" -type d | head -1)
          echo "Selected: $RUNNER"

          echo ""
          echo "===== ALL files in .app ====="
          find "$RUNNER" -type f | sort

          echo ""
          echo "===== Info.plist ====="
          cat "$RUNNER/Info.plist" 2>/dev/null || echo "NO Info.plist!"

          echo ""
          echo "===== Executable check ====="
          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$RUNNER/Info.plist" 2>/dev/null || echo "")
          echo "CFBundleExecutable = $EXEC"
          ls -la "$RUNNER/$EXEC" 2>/dev/null || echo "Executable file NOT found"
          file "$RUNNER/$EXEC" 2>/dev/null || echo "Cannot check file type"

      - name: Package IPA
        run: |
          RUNNER=$(find ./build/Build/Products -maxdepth 2 -name "*Runner*.app" -type d | head -1)
          APP_NAME=$(basename "$RUNNER")

          echo "Packaging: $RUNNER as $APP_NAME"

          # Use ditto for proper macOS file copy (handles resource forks)
          rm -rf _staging
          mkdir -p "_staging/Payload"
          ditto "$RUNNER" "_staging/Payload/$APP_NAME"

          # Ad-hoc sign so Sideloadly can process it
          codesign --force --deep --sign - "_staging/Payload/$APP_NAME" 2>&1 || echo "Ad-hoc sign note (ok to fail)"

          echo ""
          echo "===== Verify Payload ====="
          ls -la "_staging/Payload/$APP_NAME/Info.plist" 2>/dev/null && echo "Info.plist: PRESENT" || echo "Info.plist: MISSING!"

          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "_staging/Payload/$APP_NAME/Info.plist" 2>/dev/null || echo "")
          ls -la "_staging/Payload/$APP_NAME/$EXEC" 2>/dev/null && echo "Executable: PRESENT" || echo "Executable: MISSING!"

          echo ""
          echo "===== Creating IPA ====="
          cd _staging
          zip -qr ../WebDriverAgent.ipa Payload/
          cd ..

          echo "===== IPA contents (key files) ====="
          unzip -l WebDriverAgent.ipa | grep -E "(Info\.plist|Runner)" | head -20

          ls -lh WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
          retention-days: 30
