name: Build WebDriverAgent IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build with ad-hoc signing
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tail -10
          echo "Build exit: $?"

      - name: Verify and package
        run: |
          RUNNER=$(find ./build/Build/Products -maxdepth 2 -name "*Runner*.app" -type d | head -1)
          echo "App: $RUNNER"
          echo ""

          echo "===== Key files ====="
          ls -la "$RUNNER/Info.plist" 2>/dev/null && echo "Info.plist: OK" || echo "Info.plist: MISSING"
          EXEC=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$RUNNER/Info.plist" 2>/dev/null || echo "UNKNOWN")
          echo "Executable name: $EXEC"
          ls -la "$RUNNER/$EXEC" 2>/dev/null && echo "Executable: OK" || echo "Executable: MISSING"
          file "$RUNNER/$EXEC" 2>/dev/null

          echo ""
          echo "===== Full .app contents ====="
          find "$RUNNER" -type f | sort | head -40

          echo ""
          APP_NAME=$(basename "$RUNNER")
          rm -rf _staging
          mkdir -p "_staging/Payload"
          ditto "$RUNNER" "_staging/Payload/$APP_NAME"

          cd _staging
          zip -qr ../WebDriverAgent.ipa Payload/
          cd ..

          echo "===== IPA verification ====="
          unzip -l WebDriverAgent.ipa | grep -E "(Info\.plist|$EXEC)" | head -10
          ls -lh WebDriverAgent.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
          retention-days: 30
