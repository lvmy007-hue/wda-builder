name: Build WebDriverAgent IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build WebDriverAgentRunner
        run: |
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -30

      - name: Package IPA
        run: |
          echo "=== Finding app ==="
          find ./build -name "*.app" -type d

          RUNNER=$(find ./build/Build/Products -name "*Runner*.app" -type d | head -1)
          if [ -z "$RUNNER" ]; then
            RUNNER=$(find ./build -name "*.app" -type d | head -1)
          fi

          if [ -z "$RUNNER" ]; then
            echo "FATAL: No .app found!"
            exit 1
          fi

          echo "Using: $RUNNER"
          ls -la "$RUNNER/"

          # Ad-hoc sign after build
          codesign --force --deep --sign - "$RUNNER" || true

          # Create IPA
          APP_NAME=$(basename "$RUNNER")
          rm -rf _staging
          mkdir -p _staging/Payload
          cp -R "$RUNNER" "_staging/Payload/$APP_NAME"

          # Verify
          ls -la "_staging/Payload/$APP_NAME/Info.plist" && echo "Info.plist OK"

          cd _staging
          zip -qr ../WebDriverAgent.ipa Payload/
          cd ..
          ls -lh WebDriverAgent.ipa
          unzip -l WebDriverAgent.ipa | head -15

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-IPA
          path: WebDriverAgent.ipa
          retention-days: 30
